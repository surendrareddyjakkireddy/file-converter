<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DOCX to PDF Converter</title>

<style>
    body {
        font-family: Arial;
        background: #f4f6f8;
        text-align: center;
        padding: 50px;
    }

    .container {
        background: white;
        padding: 30px;
        border-radius: 10px;
        width: 350px;
        margin: auto;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    button {
        background: #007bff;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        margin-top: 10px;
    }

    button:disabled {
        background: gray;
    }

    #downloadBtn {
        display: none;
        background: green;
    }

    .error { color: red; }
    .success { color: green; }
</style>
</head>

<body>

<div class="container">
    <h2>DOCX → PDF Converter</h2>

    <input type="file" id="fileInput" accept=".docx" /><br>

    <button onclick="uploadFile()" id="convertBtn">Convert</button>

    <!-- ✅ NEW DOWNLOAD BUTTON -->
    <button id="downloadBtn" onclick="downloadFile()">Download PDF</button>

    <p id="status"></p>
</div>

<script>
let pdfUrl = null; // store file URL

async function uploadFile() {
    const fileInput = document.getElementById("fileInput");
    const status = document.getElementById("status");
    const downloadBtn = document.getElementById("downloadBtn");

    status.innerText = "";
    downloadBtn.style.display = "none";

    if (!fileInput.files.length) {
        status.innerText = "Select a file!";
        status.className = "error";
        return;
    }

    const file = fileInput.files[0];

    const formData = new FormData();
    formData.append("file", file);

    try {
        status.innerText = "Converting...";

        const response = await fetch("http://localhost:8084/api/file/service/docx-to-pdf", {
            method: "POST",
            body: formData
        });

        if (!response.ok) throw new Error("Conversion failed");

        const blob = await response.blob();

        // ✅ Store URL instead of auto download
        pdfUrl = window.URL.createObjectURL(blob);

        status.innerText = "✅ Conversion completed!";
        status.className = "success";

        // ✅ Show download button
        downloadBtn.style.display = "inline-block";

    } catch (err) {
        status.innerText = "❌ Error: " + err.message;
        status.className = "error";
    }
}

// ✅ Download only when button clicked
function downloadFile() {
    if (!pdfUrl) return;

    const a = document.createElement("a");
    a.href = pdfUrl;
    a.download = "converted.pdf";
    a.click();
}
</script>

</body>
</html>
